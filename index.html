<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I &lt;3 MICHAEL CERA</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="style.css">    
</head>
<body>
    
    <div class="container">
        <div class="card">
            <img src="img/cera1.png" alt="Michael Cera 1" id="cera-1">
            <img src="img/cera2.png" alt="Michael Cera 2" id="cera-2">
            <img src="img/cera3.png" alt="Michael Cera 3" id="cera-3">
            <img src="img/cera5.png" alt="Michael Cera 5" id="cera-5">
            <img src="img/cera7.png" alt="Michael Cera 7" id="cera-7">
            <img src="img/cera8.png" alt="Michael Cera 8" id="cera-8">

            <div class="card-items">
                <div class="card-top">
                    <div class="icons">
                        <span class="material-symbols-outlined" id="left">arrow_back_ios</span>
                        <span class="material-symbols-outlined" id="right">arrow_forward_ios</span>
                    </div>

                    <div class="title">
                        <h3>Michael Cera</h3>
                        <h1>Card Animation</h1>
                    </div>
                </div>

                <div class="card-bottom">
                    <h3>Descrição</h3>
                    <p>Expressões naturais de Michael Cera, capturando seu jeito tímido, introspectivo e genuinamente único.</p>
                    <a href="#" class="btn">Download here!</a>
                </div>

            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
